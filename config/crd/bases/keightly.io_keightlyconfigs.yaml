---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: keightlyconfigs.keightly.io
spec:
  group: keightly.io
  names:
    kind: KeightlyConfig
    listKind: KeightlyConfigList
    plural: keightlyconfigs
    singular: keightlyconfig
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.active
      name: Active
      type: boolean
    - jsonPath: .status.connectedMonitors
      name: ConnectedMonitors
      type: integer
    - jsonPath: .status.lastHealthCheck
      name: LastHealthCheck
      type: string
    - jsonPath: .status.message
      name: Message
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          KeightlyConfig is the cluster-wide singleton configuration for the Keightly operator.
          Exactly one instance must exist and it must be named "keightly".
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: KeightlyConfigSpec defines the desired state of KeightlyConfig.
            properties:
              ai:
                description: AI configures the AI provider used for all diagnoses.
                properties:
                  apiKeySecretRef:
                    description: |-
                      APIKeySecretRef references a Secret in the keightly-system namespace that
                      holds the AI provider API key. The Secret must exist before KeightlyConfig
                      is reconciled. There is no namespace field — the secret always lives in
                      keightly-system to keep credentials isolated from workload namespaces.
                    properties:
                      key:
                        description: Key is the key within the Secret whose value
                          is the API key.
                        minLength: 1
                        type: string
                      name:
                        description: Name is the name of the Secret.
                        minLength: 1
                        type: string
                    required:
                    - key
                    - name
                    type: object
                  model:
                    description: Model is the model identifier to use (e.g. "claude-opus-4-6").
                    minLength: 1
                    type: string
                  provider:
                    description: Provider is the AI backend to use. Currently only
                      "anthropic" is supported.
                    enum:
                    - anthropic
                    type: string
                required:
                - apiKeySecretRef
                - model
                - provider
                type: object
              diagnosisRetention:
                default: 72h
                description: |-
                  DiagnosisRetention controls how long completed KeightlyDiagnosis CRs are kept
                  before the operator deletes them. Accepts standard Go duration strings (e.g. "72h").
                  Minimum "1h".

                  Retention cleanup rules:
                    - Only KeightlyDiagnosis CRs in Diagnosed or Error phase are eligible for
                      auto-deletion once they exceed this age.
                    - CRs in Pending, Gathering, or Diagnosing phase are NEVER auto-deleted
                      regardless of age, so in-flight diagnoses are never torn out from under
                      a running agent loop.
                type: string
                x-kubernetes-validations:
                - message: diagnosisRetention must be at least 1h
                  rule: duration(self) >= duration('1h')
              maxConcurrentDiagnoses:
                default: 5
                description: |-
                  MaxConcurrentDiagnoses caps how many diagnosis agent loops may run in parallel
                  across the whole cluster. Tune this to avoid overwhelming the AI API rate limits.
                maximum: 10
                minimum: 1
                type: integer
            required:
            - ai
            type: object
          status:
            description: KeightlyConfigStatus reflects the observed state of KeightlyConfig.
            properties:
              active:
                description: |-
                  Active is true when the operator has successfully initialised and is
                  actively watching for failure events.
                type: boolean
              connectedMonitors:
                description: |-
                  ConnectedMonitors is the number of KeightlyMonitor CRs currently being
                  reconciled by this operator instance.
                type: integer
              lastHealthCheck:
                description: |-
                  LastHealthCheck is the RFC3339 timestamp of the most recent successful
                  AI API health probe.
                type: string
              message:
                description: |-
                  Message contains a human-readable explanation of why active is false.
                  Empty when active is true.
                type: string
            required:
            - active
            - connectedMonitors
            type: object
        required:
        - spec
        type: object
        x-kubernetes-validations:
        - message: KeightlyConfig must be named 'keightly'
          rule: self.metadata.name == 'keightly'
    served: true
    storage: true
    subresources:
      status: {}
